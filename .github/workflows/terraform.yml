name: terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_ROLE_ARN }}
          aws-region: us-west-2

      - name: Install Lambda deps
        run: cd lambdas/contact && npm ci --omit=dev

      - name: fmt / init / validate
        run: |
          terraform fmt -check -recursive
          terraform init -input=false
          terraform validate

      - name: plan
        run: terraform plan -input=false -no-color -out=tfplan
        env:
          TF_VAR_owner_email: ${{ secrets.OWNER_EMAIL }}
          TF_VAR_ses_verified_sender: ${{ secrets.SES_SENDER }}

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_ROLE_ARN }}
          aws-region: us-west-2

      - name: Install Lambda deps
        run: cd lambdas/contact && npm ci --omit=dev

      - name: init
        run: terraform init -input=false

      - name: apply
        run: terraform apply -input=false -auto-approve
        env:
          TF_VAR_owner_email: ${{ secrets.OWNER_EMAIL }}
          TF_VAR_ses_verified_sender: ${{ secrets.SES_SENDER }}
