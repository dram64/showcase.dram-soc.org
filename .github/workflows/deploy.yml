name: deploy

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (Astro static)
        env:
          PUBLIC_CONTACT_API: ${{ vars.PUBLIC_CONTACT_API }}
          PUBLIC_SITE_URL: https://dram-soc.org
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Sync to S3 (primary us-west-2)
        run: |
          aws s3 sync dist/ s3://${{ vars.SITE_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "sitemap*.xml" \
            --exclude "robots.txt" \
            --exclude "status.json" \
            --exclude "insights.json"
          aws s3 sync dist/ s3://${{ vars.SITE_BUCKET }}/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --exclude "*" \
            --include "*.html"

      - name: Sync to S3 (DR us-east-1)
        run: |
          aws s3 sync dist/ s3://${{ vars.SITE_BUCKET }}-dr/ \
            --region us-east-1 \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "sitemap*.xml" \
            --exclude "robots.txt" \
            --exclude "status.json" \
            --exclude "insights.json"
          aws s3 sync dist/ s3://${{ vars.SITE_BUCKET }}-dr/ \
            --region us-east-1 \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
